syntax = "proto3";

package envoy.extensions.transport_sockets.tls.v3;

import "envoy/config/core/v3/base.proto";

message Secret {
  string name = 1;

  oneof type {
    TlsCertificate tls_certificate = 2;
    TlsSessionTicketKeys session_ticket_keys = 3;
    CertificateValidationContext validation_context = 4;
    GenericSecret generic_secret = 5;
  }
}

message TlsCertificate {
  envoy.config.core.v3.DataSource certificate_chain = 1;
  envoy.config.core.v3.DataSource private_key = 2;
}

message CertificateValidationContext {
  envoy.config.core.v3.DataSource trusted_ca = 1;
}

message TlsSessionTicketKeys {}

message GenericSecret {
  envoy.config.core.v3.DataSource secret = 1;
}

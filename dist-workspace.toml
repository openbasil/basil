# dist (cargo-dist) release configuration.
#
# Pinned to dist 0.32.0 -- the current stable release (2026-05-21).
# Reference: https://axodotdev.github.io/cargo-dist/book/reference/config.html
#
# What dist owns here:
#   * signed, attested `.tar.xz` archives for the three first-class targets
#     below, covering the `basil` and `basil-nats-bridge` binaries;
#   * a Homebrew formula (serves macOS arm64 AND Linux) published to the
#     `openbasil/homebrew-tap` tap;
#   * GitHub Artifact Attestations (build provenance) for every artifact.
#
# What dist does NOT do natively (0.32.0 has no `.deb`/`.rpm`/Arch installer),
# and is therefore handled by hand-written jobs in .github/workflows/release.yml:
#   * Debian `.deb` packages (amd64 + arm64) via `dpkg-deb`;
#   * an Arch `.pkg.tar.zst` built from the release archives via packaging/arch.

[workspace]
members = ["cargo:."]

[dist]
# Pin the exact dist version CI installs and runs. Bump deliberately.
cargo-dist-version = "0.32.0"
# CI backend + release hosting.
ci = "github"
hosting = "github"
# The dist-able packages ship the unified `basil` binary and the companion
# `basil-nats-bridge` courier. The `basil` binary is built with its DEFAULT
# features (db-keystore + onepassword + unlock-age-yubikey + unlock-bip39). PQC
# and SPIFFE client dependencies are always compiled in. Optional HTTP server,
# TPM, AWS KMS, GCP KMS, OTLP, and secure allocator surfaces are deliberately
# outside the default release build.
packages = ["basil-bin", "basil-nats-bridge"]
installers = ["shell", "homebrew"]
# First-class release targets.
targets = [
  "x86_64-unknown-linux-gnu",
  "aarch64-unknown-linux-gnu",
  "aarch64-apple-darwin",
]
# Compressed-tar archive for every (unix-only) target.
unix-archive = ".tar.xz"
# Homebrew tap the `publish-homebrew-formula` job pushes to. The tap repo must
# exist and CI must hold a HOMEBREW_TAP_TOKEN secret (see docs/runbooks/release.md).
tap = "openbasil/homebrew-tap"
# Release tags must use `v{semver}`. cargo-dist 0.32.0 parses `basil-v0.7.0`
# as a singular package tag for the `basil` Rust client crate, which has no
# distributable binaries, so the release matrix comes out empty.
publish-jobs = ["homebrew"]
# Only run `dist plan` on PRs (no artifact uploads).
pr-run-mode = "plan"
# Publish RCs to the tap when the release tag itself is a prerelease.
publish-prereleases = true
# Emit GitHub Artifact Attestations (Sigstore build provenance) for all
# artifacts. Verified with `gh attestation verify` (public repo required).
github-attestations = true
# release.yml is deliberately hand-extended beyond what `dist generate` emits
# (the Debian and Arch-package jobs above). Without this, every dist command
# fails the CI-freshness check against the generated baseline. Consequence:
# dist will never auto-update release.yml; after bumping cargo-dist-version,
# re-run `dist generate` and re-apply the custom jobs (see docs/runbooks/release.md).
allow-dirty = ["ci"]

# System build dependencies dist installs on the artifact-build runners before
# `dist build`. basil-bin ships `basil-nats-bridge`, whose basil-proto dependency
# runs `tonic-prost-build` in its build script -- that shells out to `protoc`.
# `dist generate` turns these into the per-target "Install dependencies" step
# (apt on Linux, Homebrew on macOS). Until release.yml is regenerated, the same
# install is wired in by hand (see the "Install protoc" steps there).
[dist.dependencies.apt]
protobuf-compiler = '*'

[dist.dependencies.homebrew]
protobuf = '*'

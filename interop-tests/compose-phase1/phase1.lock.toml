schema = "basil-compose-phase1-lock"
schema_version = 1
design = "Design 0001 revision 1.1"
feature = "Compose integration 1.0"

[evidence]
event_schema = "basil.compose.phase1.event"
event_schema_version = 1
manifest_schema = "basil.compose.phase1.manifest"
manifest_schema_version = 1
maximum_event_bytes = 16777216
maximum_events = 10000

[suites.lane-smoke]
required_tests = [
  "lane.artifacts",
  "lane.cgroup-v2",
  "lane.lsm-enforcing",
  "lane.runtime-mode",
  "lane.network-isolation",
]

[suites.runtime-evidence]
required_tests = [
  "runtime.peer-correlation",
  "runtime.pid-start-time",
  "runtime.same-uid-isolation",
  "runtime.realm-overlap",
  "runtime.stale-and-conflicting",
]

[suites.wrapper-feasibility]
required_tests = [
  "wrapper.argv",
  "wrapper.pid1-signals-exit",
  "wrapper.tmpfs-and-cleanup",
  "wrapper.lsm",
  "wrapper.platform",
]

[suites.capacity]
required_tests = [
  "capacity.preflight",
  "capacity.resources",
  "capacity.latency",
  "capacity.overload",
  "capacity.teardown",
]

# Readiness-only capacity preflight (basil-ge9). Distinct from `[suites.capacity]`
# above, which is the later basil-9tj.4 measurement suite. This suite qualifies
# the ENVIRONMENT for a serial 1,000-container ladder — host and both guests — and
# makes no broker/attestor/protocol ceiling claim. It runs on BOTH qualified
# lanes (fedora-44-x86_64, ubuntu-24.04-x86_64): the runner exports
# BASIL_DRIVER_SUITE, and each lane driver, when it reads capacity-preflight,
# runs guest/capacity-preflight.sh inside the booted guest and maps its bounded
# JSONL (retained as raw/guest-events.jsonl) onto these four terminals:
#   preflight.host-baseline     full cpu/mem/disk/fd/pid/namespace/cgroup fact
#                               set collected (guest verdict in the message)
#   preflight.runtime-baseline  the lane's required runtime mode observed
#                               (rootless podman / rootful docker on cgroup v2)
#   preflight.evidence-retention  ladder evidence sizing projection computed
#   preflight.stop-conditions   derived safe scale-ladder stop thresholds present
# These terminals assert complete readiness-evidence COLLECTION; the guest's
# ready/blocker verdict is never converted into a pass — it travels in the
# bounded messages and the retained raw JSONL. Host-side readiness (and the
# host-scale retention fit) is retained as the labeled host-preflight artifact
# under the evidence root.
[suites.capacity-preflight]
required_tests = [
  "preflight.host-baseline",
  "preflight.runtime-baseline",
  "preflight.evidence-retention",
  "preflight.stop-conditions",
]

[lanes.fedora-44-x86_64]
architecture = "x86_64"
acceleration = "kvm"
distribution = "Fedora 44"
runtime = "podman-rootless"
lsm = "selinux-enforcing"
cloud_init = "cloud-init/fedora-44.yaml"
artifacts = ["fedora-44-cloud-x86_64"]
machine = "q35"
base_format = "qcow2"
overlay_format = "qcow2"
memory_mib = 4096
vcpus = 4
network = "user-loopback-only"
driver = "fedora-selinux-rootless"
qualification = true
performance = true

# Fedora lane smoke suite (basil-3kx). The retained lane driver reports exactly
# these seven confinement tests. lane.artifacts is intentionally excluded: the
# runner already verifies the lane's artifacts directly (verify_lane_artifacts),
# and a real driver cannot both report lane.artifacts and let the runner pre-emit
# it without a duplicate-terminal event-validation failure.
[suites.fedora-smoke]
required_tests = [
  "lane.cgroup-v2",
  "lane.lsm-enforcing",
  "lane.runtime-mode",
  "lane.rootless-owner-a",
  "lane.rootless-owner-b",
  "lane.compose-provider",
  "lane.network-isolation",
]

[lanes."ubuntu-24.04-x86_64"]
architecture = "x86_64"
acceleration = "kvm"
distribution = "Ubuntu 24.04 LTS"
runtime = "docker-rootful"
lsm = "apparmor-enforcing"
cloud_init = "cloud-init/ubuntu-24.04.yaml"
artifacts = ["ubuntu-24.04-cloud-x86_64", "workload-alpine"]
machine = "q35,accel=kvm:tcg"
base_format = "qcow2"
overlay_format = "qcow2"
memory_mib = 4096
vcpus = 4
network = "user-loopback-only"
driver = "ubuntu-2404"
qualification = true
performance = true

[lanes."ubuntu-24.04-aarch64"]
architecture = "aarch64"
acceleration = "tcg"
# FUNCTIONAL-ONLY architecture-emulation lane (basil-snd). aarch64-on-x86_64 is
# cross-architecture emulation: QEMU runs it under TCG unconditionally, because
# KVM cannot accelerate a foreign guest architecture (the sandbox `/dev/kvm` is
# irrelevant here). Every result is functional evidence only and must never
# support a performance, capacity, timing, or native-host claim; the lane also
# makes no LSM-enforcement qualification claim (`lsm = "not-qualified"`).
tier = "functional-only"
functional_only = true
distribution = "Ubuntu 24.04 LTS"
runtime = "crun-oci"
lsm = "not-qualified"
cloud_init = "cloud-init/ubuntu-24.04-arm64.yaml"
artifacts = ["ubuntu-24.04-cloud-aarch64"]
machine = "virt,gic-version=max,accel=tcg"
base_format = "qcow2"
overlay_format = "qcow2"
memory_mib = 4096
vcpus = 4
network = "user-loopback-only"
driver = "ubuntu-2404-arm64"
qualification = false
performance = false

# Ubuntu 24.04 aarch64 FUNCTIONAL-ONLY smoke (driver `ubuntu-2404-arm64`,
# basil-snd). TCG cross-architecture emulation: functional evidence only, with
# no timing, capacity, or native-host claim. `lane.artifacts` is runner-owned
# (the runner emits its terminal after verify_lane_artifacts); the driver
# reports the four functional tests: it boots the aarch64 guest from the
# verified image, confirms `uname -m` is aarch64 and cgroup v2, and runs an
# architecture-sensitive container with a daemonless OCI runtime (crun).
[suites.ubuntu-2404-arm64-functional-smoke]
required_tests = [
  "lane.artifacts",
  "lane.boot",
  "lane.arch",
  "lane.cgroup-v2",
  "lane.container-runtime",
]

# Development-only mock lane. It boots no guest and carries no artifacts; the
# null driver exercises the driver contract and read-only sandbox so the harness
# is testable without a VM. The runner refuses this lane under --qualification.
[lanes.dev-null]
architecture = "none"
acceleration = "none"
distribution = "development-mock"
runtime = "none"
lsm = "none"
artifacts = []
driver = "null"
development_only = true
qualification = false
performance = false

[suites.dev-null]
required_tests = [
  "dev.result-contract",
  "dev.sandbox-readonly",
]

# Ubuntu 24.04 rootful-Docker lane smoke (driver `ubuntu-2404`).
# `lane.artifacts` is runner-owned: the runner emits its terminal after
# verifying the lane's `artifacts` list, drivers owe no coverage for it, and a
# driver that reports it is rejected. The driver reports every other test here.
[suites.ubuntu-2404-lane-smoke]
required_tests = [
  "lane.artifacts",
  "lane.cgroup-v2",
  "lane.lsm-enforcing",
  "lane.runtime-mode",
  "lane.container-confinement",
  "lane.compose-plugin",
]

# SPDX-License-Identifier: Apache-2.0

preserve_hostname: false
hostname: basil-phase1-ubuntu2404
manage_etc_hosts: true
ssh_pwauth: false
disable_root: true

users:
  - default
  - name: basil-ci
    gecos: Basil Phase 1 harness
    shell: /bin/bash
    lock_passwd: true
    ssh_authorized_keys:
      - __BASIL_PHASE1_SSH_PUBLIC_KEY__

write_files:
  - path: /etc/basil-phase1-lane
    owner: root:root
    permissions: '0600'
    content: |
      lane=ubuntu-24.04-x86_64-or-aarch64
      design=Design 0001 revision 1.1
      purpose=feasibility-evidence-only
  - path: /etc/systemd/system/basil-phase1-foundation.service
    owner: root:root
    permissions: '0644'
    content: |
      [Unit]
      Description=Validate Ubuntu Phase 1 foundation without weakening AppArmor
      After=multi-user.target
      ConditionPathExists=/etc/basil-phase1-lane

      [Service]
      Type=oneshot
      ExecStart=/bin/sh -c 'test "$(/usr/bin/cat /sys/module/apparmor/parameters/enabled)" = Y'
      ExecStart=/bin/sh -c 'test "$(/usr/bin/stat -fc %%T /sys/fs/cgroup)" = cgroup2fs'
      RemainAfterExit=yes

      [Install]
      WantedBy=multi-user.target

runcmd:
  - [systemctl, daemon-reload]
  - [systemctl, enable, --now, basil-phase1-foundation.service]

final_message: "Basil Compose Phase 1 Ubuntu foundation ready; runtime packages remain lane-provisioning inputs"

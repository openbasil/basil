name: CI

# Mandatory cargo gates (build / clippy / test / fmt) plus the cross-engine
# acceptance suite (`just test-e2e both`) with BOTH OpenBao (`bao`) and
# HashiCorp Vault (`vault`) on PATH. The e2e runner SKIPs cleanly when an
# engine binary is absent, so CI installs both to get real coverage and to
# fail the build on cross-engine regressions or capability/wire drift.
#
# Triggers (mirrors build.yml): this workflow deliberately does NOT run on
# branch pushes or pull requests. It runs only on:
#   * push of a `v{semver}` release tag (`vN.N.N[-suffix]`, the convention
#     shared with build.yml and release.yml) whose commit is on `main` -- a
#     guard rejects tags that are not an ancestor of main; the full
#     architecture matrix runs.
#   * manual `workflow_dispatch` -> test one chosen architecture (or `all`).
#
# The cargo gates run on every selected architecture. The cross-engine e2e and
# the Go / Rust<->Go interop suites run on the Linux architectures only, because
# OpenBao and Vault ship release binaries for linux/{amd64,arm64} but not macOS.

on:
  push:
    tags:
      # Strict v{semver} (prerelease suffixes match via the trailing `*`):
      # the same tag convention release.yml and build.yml trigger on.
      - 'v[0-9]+.[0-9]+.[0-9]+*'
  workflow_dispatch:
    inputs:
      architecture:
        description: Architecture to test (dispatch only; tag runs are always all)
        type: choice
        default: all
        options:
          - all
          - x86_64-linux
          - aarch64-linux
          - aarch64-darwin

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}-${{ github.event.inputs.architecture || 'all' }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  # Pin the engine versions installed below. Bump deliberately.
  OPENBAO_VERSION: "2.5.5"
  VAULT_VERSION: "1.17.6"

jobs:
  # Compute the architecture matrix and enforce the release-tag guard. A tag
  # push tests all three platforms; a manual dispatch tests the single selected
  # architecture, or all three when `all`. Two outputs are emitted: `all` (every
  # selected arch, for the cargo gates) and `linux` (Linux arches only, for the
  # engine e2e + Go interop, which have no macOS engine binaries). Each arch
  # builds natively on its matching runner so nothing cross-compiles.
  matrix:
    runs-on: ubuntu-latest
    outputs:
      all: ${{ steps.set.outputs.all }}
      linux: ${{ steps.set.outputs.linux }}
    steps:
      # Full history so the "tag is on main" guard can check ancestry. Only a
      # tag push needs the checkout; a manual dispatch just reads the arch input.
      - name: Checkout
        if: ${{ github.event_name == 'push' }}
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Reject release tags not on main
        if: ${{ github.event_name == 'push' }}
        shell: bash
        run: |
          set -euo pipefail
          git fetch --no-tags origin main
          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "::error::tag ${{ github.ref_name }} (${GITHUB_SHA}) is not an ancestor of main; refusing to run CI" >&2
            exit 1
          fi

      - id: set
        shell: bash
        env:
          # Tag pushes (and any non-dispatch event) test everything.
          ARCH: ${{ github.event_name == 'workflow_dispatch' && inputs.architecture || 'all' }}
        run: |
          all='[
            {"arch":"x86_64-linux","runner":"ubuntu-latest","os":"linux","pkg_arch":"amd64"},
            {"arch":"aarch64-linux","runner":"ubuntu-22.04-arm","os":"linux","pkg_arch":"arm64"},
            {"arch":"aarch64-darwin","runner":"macos-14","os":"darwin","pkg_arch":""}
          ]'
          if [ "$ARCH" = "all" ]; then
            sel=$(jq -c . <<<"$all")
          else
            sel=$(jq -c --arg a "$ARCH" '[ .[] | select(.arch == $a) ]' <<<"$all")
          fi
          linux=$(jq -c '[ .[] | select(.os == "linux") ]' <<<"$sel")
          echo "all=$sel" >> "$GITHUB_OUTPUT"
          echo "linux=$linux" >> "$GITHUB_OUTPUT"

  ci:
    name: gates + cross-engine e2e (${{ matrix.arch }})
    needs: matrix
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.matrix.outputs.all) }}
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      # Provision the exact toolchain pinned by rust-toolchain.toml (channel +
      # rustfmt/clippy components + targets). `rustup show` installs the
      # override-file toolchain if it is missing, so the workflow never hardcodes
      # a Rust version -- bump rust-toolchain.toml and CI follows.
      - name: Install Rust toolchain (from rust-toolchain.toml)
        run: rustup show

      - name: Cache cargo
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Install just
        uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3 # v4

      # basil-proto's build.rs drives `tonic-prost-build`, which shells out to
      # `protoc`. The Nix build (build.yml) gets it from the flake; these native
      # cargo builds need it installed on the runner.
      - name: Install protoc (Linux)
        if: ${{ runner.os == 'Linux' }}
        run: |
          set -euo pipefail
          sudo find /etc/apt/sources.list.d -maxdepth 1 -type f \( -name 'azure*.list' -o -name 'microsoft*.list' -o -name '*microsoft*.list' \) -print -delete || true
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler
          protoc --version

      - name: Install protoc (macOS)
        if: ${{ runner.os == 'macOS' }}
        run: |
          set -euo pipefail
          brew install protobuf
          protoc --version

      # OpenBao + Vault are only needed for the Linux-only e2e suite below and
      # ship no macOS binaries, so these steps skip on the darwin runner.
      - name: Install OpenBao (bao) onto PATH
        if: ${{ matrix.os == 'linux' }}
        env:
          PKG_ARCH: ${{ matrix.pkg_arch }}
        run: |
          set -euo pipefail
          url="https://github.com/openbao/openbao/releases/download/v${OPENBAO_VERSION}/openbao_${OPENBAO_VERSION}_linux_${PKG_ARCH}.deb"
          curl -fsSL -o /tmp/bao.deb "$url"
          sudo dpkg -i /tmp/bao.deb
          bao version

      - name: Install HashiCorp Vault (vault) onto PATH
        if: ${{ matrix.os == 'linux' }}
        env:
          PKG_ARCH: ${{ matrix.pkg_arch }}
        run: |
          set -euo pipefail
          url="https://releases.hashicorp.com/vault/${VAULT_VERSION}/vault_${VAULT_VERSION}_linux_${PKG_ARCH}.zip"
          curl -fsSL -o /tmp/vault.zip "$url"
          sudo unzip -o /tmp/vault.zip -d /usr/local/bin
          sudo chmod +x /usr/local/bin/vault
          vault version

      # ---- Mandatory cargo gates ----
      - name: Build
        run: cargo build --workspace --all-features

      - name: Clippy (zero warnings)
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: Test
        run: cargo test --workspace

      - name: Format check
        run: cargo fmt --all --check

      # ---- Cross-engine acceptance suite (OpenBao + Vault) ----
      # Both engines are on PATH, so this exercises real coverage rather than
      # SKIPping. Non-zero exit iff any engine's e2e FAILED. Linux only: the
      # engines ship no macOS release binaries.
      - name: Cross-engine e2e (OpenBao + Vault)
        if: ${{ matrix.os == 'linux' }}
        run: just test-e2e both

  # Go unit tests plus the Rust<->Go streaming interop suite. Kept separate from
  # the cargo gates so the Go toolchain and the `clients/go` submodule are only
  # provisioned here. `test-stream-interop` builds the Rust `stream_cli` example
  # and drives it from the Go interop tests, so this job needs BOTH toolchains.
  # Linux arches only (skipped when a dispatch selects macOS alone).
  go-tests:
    name: go + rust<->go stream interop (${{ matrix.arch }})
    needs: matrix
    if: ${{ needs.matrix.outputs.linux != '[]' }}
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.matrix.outputs.linux) }}
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout (with clients/go submodule)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          submodules: recursive

      # `test-stream-interop` compiles a Rust example; use the same
      # rust-toolchain.toml-pinned toolchain as the gates job.
      - name: Install Rust toolchain (from rust-toolchain.toml)
        run: rustup show

      - name: Cache cargo
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Install Go (from clients/go/go.mod)
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: clients/go/go.mod

      - name: Install just
        uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3 # v4

      # `test-stream-interop` builds the Rust `stream_cli` example, whose
      # basil-proto dependency runs `protoc` in its build script.
      - name: Install protoc
        run: |
          set -euo pipefail
          sudo find /etc/apt/sources.list.d -maxdepth 1 -type f \( -name 'azure*.list' -o -name 'microsoft*.list' -o -name '*microsoft*.list' \) -print -delete || true
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler
          protoc --version

      # Every checked-in Go module: clients/go, the OIDC verifier, and go-spiffe.
      - name: Go unit tests
        run: just test-go

      # Proves the Go and Rust stream implementations produce byte-identical
      # containers by driving the built Rust `stream_cli` from the Go interop tests.
      - name: Rust<->Go stream interop
        run: just test-stream-interop

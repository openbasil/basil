#
# CI that:
#
# * checks for a Git Tag that looks like a release
# * builds artifacts with dist (archives, installers, hashes)
# * uploads those artifacts to temporary workflow zip
# * on success, uploads the artifacts to a GitHub Release
#
# Note that the GitHub Release will be created with a generated
# title/body based on your changelogs.

name: Release
permissions:
  "contents": "write"

# This task will run whenever you push a git tag that looks like a version
# like "1.0.0", "v0.1.0-prerelease.1", "my-app/0.1.0", "releases/v1.0.0", etc.
# Various formats will be parsed into a VERSION and an optional PACKAGE_NAME, where
# PACKAGE_NAME must be the name of a Cargo package in your workspace, and VERSION
# must be a Cargo-style SemVer Version (must have at least major.minor.patch).
#
# If PACKAGE_NAME is specified, then the announcement will be for that
# package (erroring out if it doesn't have the given version or isn't dist-able).
#
# If PACKAGE_NAME isn't specified, then the announcement will be for all
# (dist-able) packages in the workspace with that version (this mode is
# intended for workspaces with only one dist-able package, or with all dist-able
# packages versioned/released in lockstep).
#
# If you push multiple tags at once, separate instances of this workflow will
# spin up, creating an independent announcement for each one. However, GitHub
# will hard limit this to 3 tags per commit, as it will assume more tags is a
# mistake.
#
# If there's a prerelease-style suffix to the version, then the release(s)
# will be marked as a prerelease.
# Runs ONLY on a pushed `v*` release tag -- deliberately NOT on branch
# pushes or pull requests. dist reads the version from the tag (github.ref_name),
# so this pipeline has no manual `workflow_dispatch`: it always needs a real tag.
on:
  push:
    tags:
      - 'v*'

jobs:
  # Run 'dist plan' (or host) to determine what tasks we need to do
  plan:
    runs-on: "ubuntu-22.04"
    outputs:
      val: ${{ steps.plan.outputs.manifest }}
      tag: ${{ !github.event.pull_request && github.ref_name || '' }}
      tag-flag: ${{ !github.event.pull_request && format('--tag={0}', github.ref_name) || '' }}
      publishing: ${{ !github.event.pull_request }}
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
          submodules: recursive
      - name: Install dist
        # we specify bash to get pipefail; it guards against the `curl` command
        # failing. otherwise `sh` won't catch that `curl` returned non-0
        shell: bash
        run: "curl --proto '=https' --tlsv1.2 -LsSf https://github.com/axodotdev/cargo-dist/releases/download/v0.32.0/cargo-dist-installer.sh | sh"
      - name: Cache dist
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: cargo-dist-cache
          path: ~/.cargo/bin/dist
      # sure would be cool if github gave us proper conditionals...
      # so here's a doubly-nested ternary-via-truthiness to try to provide the best possible
      # functionality based on whether this is a pull_request, and whether it's from a fork.
      # (PRs run on the *source* but secrets are usually on the *target* -- that's *good*
      # but also really annoying to build CI around when it needs secrets to work right.)
      - id: plan
        run: |
          dist ${{ (!github.event.pull_request && format('host --steps=create --tag={0}', github.ref_name)) || 'plan' }} --output-format=json > plan-dist-manifest.json
          echo "dist ran successfully"
          cat plan-dist-manifest.json
          echo "manifest=$(jq -c "." plan-dist-manifest.json)" >> "$GITHUB_OUTPUT"
      - name: "Upload dist-manifest.json"
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: artifacts-plan-dist-manifest
          path: plan-dist-manifest.json

  # Build and packages all the platform-specific things
  build-local-artifacts:
    name: build-local-artifacts (${{ join(matrix.targets, ', ') }})
    # Let the initial task tell us to not run (currently very blunt)
    needs:
      - plan
    if: ${{ fromJson(needs.plan.outputs.val).ci.github.artifacts_matrix.include != null && (needs.plan.outputs.publishing == 'true' || fromJson(needs.plan.outputs.val).ci.github.pr_run_mode == 'upload') }}
    strategy:
      fail-fast: false
      # Target platforms/runners are computed by dist in create-release.
      # Each member of the matrix has the following arguments:
      #
      # - runner: the github runner
      # - dist-args: cli flags to pass to dist
      # - install-dist: expression to run to install dist on the runner
      #
      # Typically there will be:
      # - 1 "global" task that builds universal installers
      # - N "local" tasks that build each platform's binaries and platform-specific installers
      matrix: ${{ fromJson(needs.plan.outputs.val).ci.github.artifacts_matrix }}
    runs-on: ${{ matrix.runner }}
    container: ${{ matrix.container && matrix.container.image || null }}
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      BUILD_MANIFEST_NAME: target/distrib/${{ join(matrix.targets, '-') }}-dist-manifest.json
    permissions:
      "attestations": "write"
      "contents": "read"
      "id-token": "write"
    steps:
      - name: enable windows longpaths
        run: |
          git config --global core.longpaths true
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
          submodules: recursive
      - name: Install Rust non-interactively if not already installed
        if: ${{ matrix.container }}
        run: |
          if ! command -v cargo > /dev/null 2>&1; then
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
            echo "$HOME/.cargo/bin" >> $GITHUB_PATH
          fi
      - name: Install dist
        run: ${{ matrix.install_dist.run }}
      # Get the dist-manifest
      - name: Fetch local artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: artifacts-*
          path: target/distrib/
          merge-multiple: true
      - name: Disable transient Microsoft apt sources
        if: ${{ runner.os == 'Linux' }}
        shell: bash
        run: |
          set -euo pipefail
          sudo find /etc/apt/sources.list.d -maxdepth 1 -type f \( -name 'azure*.list' -o -name 'microsoft*.list' -o -name '*microsoft*.list' \) -print -delete || true
      - name: Install dependencies
        run: |
          ${{ matrix.packages_install }}
      # basil-proto's build script runs `protoc` via tonic-prost-build. This is
      # also declared in dist-workspace.toml ([dist.dependencies]) so a future
      # `dist generate` folds it into the step above; kept explicit here until
      # release.yml is regenerated.
      - name: Install protoc
        shell: bash
        run: |
          set -euo pipefail
          case "$RUNNER_OS" in
            Linux)
              sudo find /etc/apt/sources.list.d -maxdepth 1 -type f \( -name 'azure*.list' -o -name 'microsoft*.list' -o -name '*microsoft*.list' \) -print -delete || true
              sudo apt-get update
              sudo apt-get install -y protobuf-compiler
              ;;
            macOS) brew install protobuf ;;
          esac
          protoc --version
      - name: Build artifacts
        run: |
          # Actually do builds and make zips and whatnot
          dist build ${{ needs.plan.outputs.tag-flag }} --print=linkage --output-format=json ${{ matrix.dist_args }} > dist-manifest.json
          echo "dist ran successfully"
      - name: Attest
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4
        with:
          subject-path: "target/distrib/*${{ join(matrix.targets, ', ') }}*"
      - id: cargo-dist
        name: Post-build
        # We force bash here just because github makes it really hard to get values up
        # to "real" actions without writing to env-vars, and writing to env-vars has
        # inconsistent syntax between shell and powershell.
        shell: bash
        run: |
          # Parse out what we just built and upload it to scratch storage
          echo "paths<<EOF" >> "$GITHUB_OUTPUT"
          dist print-upload-files-from-manifest --manifest dist-manifest.json >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

          cp dist-manifest.json "$BUILD_MANIFEST_NAME"
      - name: "Upload artifacts"
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: artifacts-build-local-${{ join(matrix.targets, '_') }}
          path: |
            ${{ steps.cargo-dist.outputs.paths }}
            ${{ env.BUILD_MANIFEST_NAME }}

  # Build and package all the platform-agnostic(ish) things
  build-global-artifacts:
    needs:
      - plan
      - build-local-artifacts
    runs-on: "ubuntu-22.04"
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      BUILD_MANIFEST_NAME: target/distrib/global-dist-manifest.json
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
          submodules: recursive
      - name: Install cached dist
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: cargo-dist-cache
          path: ~/.cargo/bin/
      - run: chmod +x ~/.cargo/bin/dist
      # Get all the local artifacts for the global tasks to use (for e.g. checksums)
      - name: Fetch local artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: artifacts-*
          path: target/distrib/
          merge-multiple: true
      - id: cargo-dist
        shell: bash
        run: |
          dist build ${{ needs.plan.outputs.tag-flag }} --output-format=json "--artifacts=global" > dist-manifest.json
          echo "dist ran successfully"

          # Parse out what we just built and upload it to scratch storage
          echo "paths<<EOF" >> "$GITHUB_OUTPUT"
          jq --raw-output ".upload_files[]" dist-manifest.json >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

          cp dist-manifest.json "$BUILD_MANIFEST_NAME"
      - name: "Upload artifacts"
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: artifacts-build-global
          path: |
            ${{ steps.cargo-dist.outputs.paths }}
            ${{ env.BUILD_MANIFEST_NAME }}
  # Determines if we should publish/announce
  host:
    needs:
      - plan
      - build-local-artifacts
      - build-global-artifacts
    # Only run if we're "publishing", and only if plan, local and global didn't fail (skipped is fine)
    if: ${{ always() && needs.plan.result == 'success' && needs.plan.outputs.publishing == 'true' && (needs.build-global-artifacts.result == 'skipped' || needs.build-global-artifacts.result == 'success') && (needs.build-local-artifacts.result == 'skipped' || needs.build-local-artifacts.result == 'success') }}
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    runs-on: "ubuntu-22.04"
    outputs:
      val: ${{ steps.host.outputs.manifest }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
          submodules: recursive
      - name: Install cached dist
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: cargo-dist-cache
          path: ~/.cargo/bin/
      - run: chmod +x ~/.cargo/bin/dist
      # Fetch artifacts from scratch-storage
      - name: Fetch artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: artifacts-*
          path: target/distrib/
          merge-multiple: true
      - id: host
        shell: bash
        run: |
          dist host ${{ needs.plan.outputs.tag-flag }} --steps=upload --steps=release --output-format=json > dist-manifest.json
          echo "artifacts uploaded and released successfully"
          cat dist-manifest.json
          echo "manifest=$(jq -c "." dist-manifest.json)" >> "$GITHUB_OUTPUT"
      - name: "Upload dist-manifest.json"
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          # Overwrite the previous copy
          name: artifacts-dist-manifest
          path: dist-manifest.json
      # Create a GitHub Release while uploading all files to it
      - name: "Download GitHub Artifacts"
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: artifacts-*
          path: artifacts
          merge-multiple: true
      - name: Cleanup
        run: |
          # Remove the granular manifests
          rm -f artifacts/*-dist-manifest.json
      - name: Create GitHub Release
        env:
          PRERELEASE_FLAG: "${{ fromJson(steps.host.outputs.manifest).announcement_is_prerelease && '--prerelease' || '' }}"
          ANNOUNCEMENT_TITLE: "${{ fromJson(steps.host.outputs.manifest).announcement_title }}"
          ANNOUNCEMENT_BODY: "${{ fromJson(steps.host.outputs.manifest).announcement_github_body }}"
          RELEASE_COMMIT: "${{ github.sha }}"
        run: |
          # Write and read notes from a file to avoid quoting breaking things
          echo "$ANNOUNCEMENT_BODY" > $RUNNER_TEMP/notes.txt

          gh release create "${{ needs.plan.outputs.tag }}" --target "$RELEASE_COMMIT" $PRERELEASE_FLAG --title "$ANNOUNCEMENT_TITLE" --notes-file "$RUNNER_TEMP/notes.txt" artifacts/*

  publish-homebrew-formula:
    needs:
      - plan
      - host
    runs-on: "ubuntu-22.04"
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      PLAN: ${{ needs.plan.outputs.val }}
      GITHUB_USER: "axo bot"
      GITHUB_EMAIL: "admin+bot@axo.dev"
    if: ${{ !fromJson(needs.plan.outputs.val).announcement_is_prerelease || fromJson(needs.plan.outputs.val).publish_prereleases }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: true
          repository: "openbasil/homebrew-tap"
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
      # So we have access to the formula
      - name: Fetch homebrew formulae
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: artifacts-*
          path: Formula/
          merge-multiple: true
      # This is extra complex because you can make your Formula name not match your app name
      # so we need to find releases with a *.rb file, and publish with that filename.
      - name: Commit formula files
        run: |
          git config --global user.name "${GITHUB_USER}"
          git config --global user.email "${GITHUB_EMAIL}"

          for release in $(echo "$PLAN" | jq --compact-output '.releases[] | select([.artifacts[] | endswith(".rb")] | any)'); do
            filename=$(echo "$release" | jq '.artifacts[] | select(endswith(".rb"))' --raw-output)
            name=$(echo "$filename" | sed "s/\.rb$//")
            version=$(echo "$release" | jq .app_version --raw-output)

            export PATH="/home/linuxbrew/.linuxbrew/bin:$PATH"
            brew update
            # We avoid reformatting user-provided data such as the app description and homepage.
            brew style --except-cops FormulaAudit/Homepage,FormulaAudit/Desc,FormulaAuditStrict --fix "Formula/${filename}" || true

            git add "Formula/${filename}"
            git commit -m "${name} ${version}"
          done
          git push

  announce:
    needs:
      - plan
      - host
      - publish-homebrew-formula
    # use "always() && ..." to allow us to wait for all publish jobs while
    # still allowing individual publish jobs to skip themselves (for prereleases).
    # "host" however must run to completion, no skipping allowed!
    if: ${{ always() && needs.host.result == 'success' && (needs.publish-homebrew-formula.result == 'skipped' || needs.publish-homebrew-formula.result == 'success') }}
    runs-on: "ubuntu-22.04"
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
          submodules: recursive

  # ===========================================================================
  # HAND-WRITTEN JOBS (not managed by dist). Regenerate release.yml with
  # `just gen-release-workflow` -- do not hand-edit the copy inside release.yml.
  # ===========================================================================

  # Debian .deb packages for amd64 + arm64. dist 0.32.0 has no native .deb
  # support, so we assemble a package directly with dpkg-deb on NATIVE runners
  # (arm64 uses GitHub's hosted arm64 Linux runner -- no cross toolchain needed).
  # Each .deb contains both shipped binaries (`basil` and `basil-nats-bridge`)
  # plus their man pages, gets its own build-provenance attestation, and is
  # attached to the Release that the `host` job created.
  debian-packages:
    name: debian-package (${{ matrix.arch }})
    needs:
      - plan
      - host
    if: ${{ needs.plan.outputs.publishing == 'true' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-22.04
          - arch: arm64
            runner: ubuntu-22.04-arm
    runs-on: ${{ matrix.runner }}
    permissions:
      "contents": "write" # attach the .deb asset to the Release
      "id-token": "write" # build-provenance attestation
      "attestations": "write"
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      # Provision the toolchain pinned by rust-toolchain.toml (no hardcoded Rust
      # version); `rustup show` installs the override-file channel if missing.
      - name: Install Rust toolchain (from rust-toolchain.toml)
        run: rustup show
      # basil-proto's build script runs `protoc` via tonic-prost-build.
      - name: Install protoc
        run: |
          set -euo pipefail
          sudo find /etc/apt/sources.list.d -maxdepth 1 -type f \( -name 'azure*.list' -o -name 'microsoft*.list' -o -name '*microsoft*.list' \) -print -delete || true
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler
          protoc --version
      - name: Build stripped release binaries and man pages
        # No --target: the runner arch matches the package arch, so this is a
        # native build. basil-bin's DEFAULT features (db-keystore +
        # onepassword + unlock-age-yubikey + unlock-bip39) are the supported
        # release build; PQC and SPIFFE client dependencies are always compiled
        # in. Optional HTTP server, TPM, AWS KMS, GCP KMS, OTLP, and secure
        # allocator surfaces are deliberately outside the default release build.
        # The profile strips symbols and uses fat LTO for shipped artifacts.
        # `xtask` emits roff man pages for both shipped binaries.
        run: |
          cargo build --profile dist -p basil-bin -p basil-nats-bridge -p xtask
          target/dist/xtask -o target/dist/man
      - name: Assemble .deb
        id: deb
        shell: bash
        env:
          ARCH: ${{ matrix.arch }}
        run: |
          version="${{ needs.plan.outputs.tag }}"
          version="${version#v}"
          deb="target/debian/basil_${version}-1_${ARCH}.deb"
          root="target/debian/root"
          rm -rf "$root"
          mkdir -p "$root/DEBIAN" "$root/usr/bin" "$root/usr/share/man/man1"

          install -Dm755 target/dist/basil "$root/usr/bin/basil"
          install -Dm755 target/dist/basil-nats-bridge "$root/usr/bin/basil-nats-bridge"
          cp target/dist/man/*.1 "$root/usr/share/man/man1/"
          gzip -9 -n "$root/usr/share/man/man1"/*.1

          cat > "$root/DEBIAN/control" <<EOF
          Package: basil
          Version: ${version}-1
          Section: utils
          Priority: optional
          Architecture: ${ARCH}
          Maintainer: Basil maintainers <info@openbasil.org>
          Homepage: https://github.com/openbasil/basil
          Depends: libc6
          Description: Broker for Attestation, Secrets, Identity and Leases
           Basil brokers cryptographic operations, workload identity (SPIFFE),
           and short-lived leases, with keys kept in the backend and used in
           place. Ships the unified basil broker/CLI and the basil-nats-bridge
           NATS courier, plus their man pages.
          EOF

          mkdir -p target/debian
          dpkg-deb --root-owner-group --build "$root" "$deb"
          echo "path=$deb" >> "$GITHUB_OUTPUT"
      - name: Attest build provenance for the .deb
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4
        with:
          subject-path: ${{ steps.deb.outputs.path }}
      - name: Attach the .deb to the GitHub Release
        run: gh release upload "${{ needs.plan.outputs.tag }}" "${{ steps.deb.outputs.path }}" --clobber

  # Arch Linux .pkg.tar.zst for x86_64 and aarch64, each built from the PUBLISHED
  # basil-bin and basil-nats-bridge release archives of that arch inside an Arch
  # container (dist has no native Arch support). x86_64 uses the official
  # `archlinux` image; aarch64 builds natively on an arm64 runner in an Arch
  # Linux ARM image. The PKGBUILD lives at
  # packaging/arch/PKGBUILD; CI patches pkgver from the tag and runs `updpkgsums`
  # so the per-arch sha256 matches the real release tarball (correct sha256
  # handling -- no blind 'SKIP'). AUR publication is a separate MANUAL step that
  # needs AUR credentials (see docs/runbooks/release.md).
  arch-package:
    name: arch-package (${{ matrix.arch }})
    needs:
      - plan
      - host
    if: ${{ needs.plan.outputs.publishing == 'true' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-22.04
            image: archlinux:base-devel
          - arch: aarch64
            runner: ubuntu-22.04-arm
            image: menci/archlinuxarm:latest
    runs-on: ${{ matrix.runner }}
    permissions:
      "contents": "write"
      "id-token": "write"
      "attestations": "write"
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - name: Derive pkgver from the tag
        id: ver
        shell: bash
        run: |
          tag="${{ needs.plan.outputs.tag }}"
          echo "version=${tag#v}" >> "$GITHUB_OUTPUT"
      - name: Build .pkg.tar.zst in an Arch container (${{ matrix.arch }})
        env:
          PKGVER: ${{ steps.ver.outputs.version }}
        # makepkg refuses to run as root, so we create an unprivileged `builder`
        # user. `updpkgsums` downloads the release tarballs and rewrites the
        # sha256sums in PKGBUILD before makepkg re-downloads and verifies them.
        # makepkg picks source_<CARCH> for the container's native arch (x86_64 on
        # the official image, aarch64 on the Arch Linux ARM image), so no CARCH
        # override is needed. `sudo` is installed explicitly since the ARM base
        # image does not ship it.
        run: |
          docker run --rm \
            -e PKGVER \
            -v "$PWD/packaging/arch:/pkg" \
            -w /pkg \
            ${{ matrix.image }} \
            bash -euo pipefail -c '
              pacman -Syu --noconfirm --needed base-devel git pacman-contrib sudo
              useradd -m builder
              chown -R builder:builder /pkg
              sed -i "s/^pkgver=.*/pkgver=${PKGVER}/" PKGBUILD
              sudo -u builder updpkgsums
              sudo -u builder makepkg -f --noconfirm
            '
      - name: Locate the built package
        id: pkg
        shell: bash
        run: |
          pkg=$(find packaging/arch -maxdepth 1 -name '*.pkg.tar.zst' -print -quit)
          if [ -z "$pkg" ]; then
            echo "no .pkg.tar.zst produced" >&2
            exit 1
          fi
          echo "path=$pkg" >> "$GITHUB_OUTPUT"
      - name: Attest build provenance for the Arch package
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4
        with:
          subject-path: ${{ steps.pkg.outputs.path }}
      - name: Attach the Arch package to the GitHub Release
        run: gh release upload "${{ needs.plan.outputs.tag }}" "${{ steps.pkg.outputs.path }}" --clobber
